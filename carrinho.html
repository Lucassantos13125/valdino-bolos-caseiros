<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meu Carrinho • Valdino Bolos Caseiros</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="tema-carrinho">

<header class="site-header">
  <div class="container header-inner">

    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="logo Valdino" class="logo" />
    </a>

    <nav class="nav" id="nav">
      <a href="index.html">Início</a>
      <a href="cardapio.html">Cardápio</a>
    </nav>

    <a href="carrinho.html" class="cart-icon" id="header-cart">
      🛒 <span id="cart-count">0</span>
    </a>

    <button class="hamburger" id="hamburger" aria-label="menu">
      &#9776;
    </button>

  </div>
</header>

<main class="container">

  <section class="carrinho">
    <h2>🛒 Meu Carrinho</h2>

    <ul id="lista-carrinho"></ul>

    <div id="total-carrinho">
      <strong>Total: R$ 0,00</strong>
    </div>

    <div id="dados-cliente">
      <h3>Dados do Cliente</h3>

      <div class="campo">
        <label for="cliente-nome">Nome</label>
        <input type="text" id="cliente-nome" />
      </div>

      <div class="campo">
        <label for="cliente-sobrenome">Sobrenome</label>
        <input type="text" id="cliente-sobrenome" />
      </div>
    </div>

    <div class="botoes-carrinho">
      <button id="finalizar" class="btn btn-primary">
        Finalizar Pedido
      </button>

      <button id="limpar-carrinho" class="btn btn-outline">
        Limpar Carrinho
      </button>
    </div>

  </section>

</main>

<!-- 🔔 TOAST PADRÃO (AGORA CONTROLADO PELO CSS) -->
<div id="toast">
  Produto adicionado ao carrinho!
</div>

<script src="script.js"></script>

</body>
</html>
