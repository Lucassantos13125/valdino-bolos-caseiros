<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pães Caseiros — Valdino Bolos Caseiros</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="tema-paes ">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="images/logo.png" alt="logo Valdino" class="logo" />
      </a>

     <nav class="nav" id="nav">
        <a href="index.html">Início</a>
        <a href="cardapio.html">Cardápio</a>
      </nav>
       <a href="carrinho.html" class="cart-icon" id="header-cart">
  🛒 <span id="cart-count">0</span>
</a>

       <button class="hamburger" id="hamburger" aria-label="paes">
        &#9776;
      </button>
    </div>

  </header>

  <main class="container">
    <section class="page-head">
      <h1>Pães Caseiros</h1>
      <p>Os Pães da Valdino Bolos Caseiros são puro amor e com massa bem leve.</p>
    </section>

    <section class="grid grid-3 products" id="produtos">
      <article class="card">
        <img src="images/pão-caseiro.jpg" alt="Pão Caseiro" />
        <div class="card-body">
          <h3>Pão Caseiro</h3>
          <div class="card-meta preco-produto" data-produto="Pão Caseiro">R$ 18,00</div>
          <button 
            class="btn btn-small btn-add" 
            data-produto="Pão Caseiro" 
            data-preco="18.00">
            Adicionar ao Carrinho
          </button>
        </div>
      </article>

      <article class="card">
        <img src="images/Pão Milho.jpg" alt="Pão de Milho" />
        <div class="card-body">
          <h3>Pão de Milho</h3>
         <div class="card-meta preco-produto" data-produto="Pão de Milho">R$ 25,00</div>
          <button 
            class="btn btn-small btn-add" 
            data-produto="Pão de Milho" 
            data-preco="25.00">
            Adicionar ao Carrinho
          </button>
        </div>
      </article>
    </section>

  

  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year-paes"></span> Valdino Bolos Caseiros</p>
    </div>
  </footer>

  <script src="script.js"></script>
   <script src="produtos.js"></script>
</body>
</html>
